name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main  # Change this to 'master' if your main branch is called master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Or '18', depending on your Angular version

      - name: Install dependencies
        run: npm ci

      - name: Build Angular application
        run: npm run build -- --prod
        # Note: If you have a specific Angular config, use npm run build -- --configuration=production

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}"
