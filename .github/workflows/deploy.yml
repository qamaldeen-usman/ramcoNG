name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main  # Change to 'master' if applicable

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # FIX: Use Node.js 22 (LTS) or 24 instead of 20
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # '22' is LTS. You can also use '24' if you prefer.

      - name: Install dependencies
        run: npm ci

      - name: Build Angular application
        run: npm run build -- --prod

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # FIX: Added '--non-interactive' to prevent prompts, and handling token better
      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}"
